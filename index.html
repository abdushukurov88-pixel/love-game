<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sening Maxsus Muhabbating</title>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --secondary-color: #c9184a;
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --text-color: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Avenir Next', 'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: var(--text-color);
            position: relative;
        }

        /* 🌌 Fon zarrachalari */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: transparent url('https://user-images.githubusercontent.com/13164172/26137684-25e2439c-8a21-11e7-9d74-1b7028c68c46.png') repeat;
        }

        /* 📦 Asosiy blok dizayni */
        .main-container {
            position: relative;
            z-index: 10;
            padding: 40px 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
            max-width: 85%;
            width: 340px;
            text-align: center;
            transform: scale(0.9);
            animation: fadeInScale 0.6s ease-out forwards;
        }

        h1 {
            color: var(--text-color);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255,77,109,0.5);
            line-height: 1.4;
        }

        h1 .highlight {
            color: var(--primary-color);
            display: block;
            margin-top: 10px;
            font-size: 32px;
        }

        /* 🔘 Tugmalar joylashuvi */
        .btns-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 70px;
            position: relative;
            align-items: center;
        }

        button {
            padding: 16px 36px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 20;
            letter-spacing: 0.5px;
        }

        #yesBtn {
            background: linear-gradient(45deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 8px 25px rgba(46,204,113,0.4);
        }

        #yesBtn:active {
            transform: scale(0.92);
        }

        #noBtn {
            background: linear-gradient(45deg, #e74c3c, #c0392b);
            color: white;
            opacity: 0.9;
            pointer-events: auto; /* Dastlab yoqilgan */
            z-index: 10;
        }

        /* 🎉 Tabrik sahifasi dizayni */
        .congrats {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .congrats-content {
            text-align: center;
            animation: bounceIn 0.8s ease-out;
            z-index: 110;
        }

        .congrats h2 {
            color: #fff;
            font-size: 34px;
            font-weight: 800;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(255,255,255,0.6);
            line-height: 1.3;
        }

        .congrats-text {
            font-size: 20px;
            color: #ffe6e6;
            font-weight: 500;
            margin-bottom: 30px;
        }

        .congrats-emoji {
            font-size: 80px;
            margin-bottom: 20px;
            display: block;
        }

        /* 🎆 Feyerverk va Yuraklar */
        .effect {
            position: absolute;
            pointer-events: none;
            opacity: 0.8;
            animation: float 4s linear infinite;
        }

        /* 🎬 Animatsiyalar */
        @keyframes fadeInScale {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        @keyframes bounceIn {
            0%, 20%, 40%, 60%, 80%, 100% { animation-timing-function: cubic-bezier(0.215, 0.61, 0.355, 1); }
            0% { opacity: 0; transform: scale3d(0.3, 0.3, 0.3); }
            20% { transform: scale3d(1.1, 1.1, 1.1); }
            40% { transform: scale3d(0.9, 0.9, 0.9); }
            60% { opacity: 1; transform: scale3d(1.03, 1.03, 1.03); }
            80% { transform: scale3d(0.97, 0.97, 0.97); }
            100% { opacity: 1; transform: scale3d(1, 1, 1); }
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(-100vh) rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 10px rgba(255,20,147,0.4); }
            100% { box-shadow: 0 0 25px rgba(255,20,147,0.7); }
        }
    </style>
</head>
<body>

    <!-- Kosmik fon -->
    <div class="stars"></div>

    <!-- Asosiy Savol Oynasi -->
    <div class="main-container" id="questionBox">
        <h1>Azizam, <span class="highlight">Mani sevasanmi?</span>🥺👉👈</h1>
        <div class="btns-wrapper">
            <button id="yesBtn" onclick="tabrikgaOtil()">Albatta 🥰</button>
            <button id="noBtn" onmouseover="qochibKet()" ontouchstart="qochibKet()">Yo'q 😜</button>
        </div>
    </div>

    <!-- 💖 Tantanali Tabrik Sahifasi (Dastlab yashirin) -->
    <div class="congrats" id="congratsPage">
        <div class="congrats-content">
            <span class="congrats-emoji">💑💞</span>
            <h2>Uraaa! ✨<br>Sani judayam ko'p<br>YAXSHI KO'RAMAN! ❤️😘</h2>
            <p class="congrats-text">Sening mehring, mening butun dunyim!</p>
        </div>
        <!-- Yuraklar fon uchun shu yerga qo'shiladi -->
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const questionBox = document.getElementById('questionBox');
        const congratsPage = document.getElementById('congratsPage');

        // 1. "Yo'q" tugmasini qochirish funksiyasi
        function qochibKet() {
            // Agar telefon bo'lsa va ustiga tekkizsa, u srazu qochishi kerak, bosib bo'lmaydi
            
            const padding = 50;
            const btnWidth = noBtn.offsetWidth;
            const btnHeight = noBtn.offsetHeight;

            // Ekran chegaralari bo'yicha erkin qochish joyi
            const maxX = window.innerWidth - btnWidth - padding;
            const maxY = window.innerHeight - btnHeight - padding;

            // Tasodifiy yangi koordinatalar (butun ekran bo'ylab)
            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // Tugmani blokdan chiqarib, fixed pozitsiyaga o'tkazish
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            noBtn.style.transition = 'all 0.15s ease-out';
            noBtn.style.opacity = '1';
        }

        // 2. "Albatta" bosilganda tabrik sahifasini ochish
        function tabrikgaOtil() {
            questionBox.style.display = 'none';
            congratsPage.style.display = 'flex';
            setTimeout(() => { congratsPage.style.opacity = '1'; }, 50); // Sekin ochilish effekti
            
            // Feyerverk va Yuraklar yomg'irini boshlash
            startEffectsRain();
        }

        // 3. Yuraklar va Feyerverk effektlarini yaratish
        function startEffectsRain() {
            const emojis = ['💖', '❤️', '💝', '🌸', '✨', '💕', '🥰'];
            
            // Ko'p sonli effektlarni hosil qilish
            for (let i = 0; i < 60; i++) {
                setTimeout(createEffectElement, i * 150, emojis);
            }
            
            // Cheksiz davom ettirish
            setInterval(() => createEffectElement(emojis), 250);
        }

        function createEffectElement(emojiList) {
            const el = document.createElement('div');
            el.classList.add('effect');
            el.innerHTML = emojiList[Math.floor(Math.random() * emojiList.length)];
            
            // Tasodifiy holat
            el.style.left = Math.random() * 100 + 'vw';
            el.style.bottom = '-50px'; // Pastdan boshlash
            el.style.animationDuration = Math.random() * 3 + 3 + 's'; // 3-6 soniya davom etadi
            el.style.fontSize = Math.random() * 25 + 25 + 'px'; // 25-50px
            
            congratsPage.appendChild(el);

            // Havoga ko'tarilib bo'lgach o'chirish
            setTimeout(() => { el.remove(); }, 6000);
        }

        // 4. Telefon foydalanuvchilari uchun ontouchstart'da 'click'ni oldini olish
        noBtn.addEventListener('touchstart', function(event) {
            event.preventDefault(); // Click'ni o'ldiradi, faqat qochish effekti ishlaydi
            qochibKet();
        });

    </script>
</body>
</html>
