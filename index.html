<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mani sevasanmi?</title>
    <style>
        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ffe6e6, #ffb3d9);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }
        h1 { color: #d63384; font-size: 26px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); text-align: center; padding: 20px; user-select: none; }
        .btn-container { position: relative; width: 100%; height: 200px; display: flex; justify-content: center; align-items: center; }
        button {
            padding: 15px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: all 0.1s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #yesBtn { background-color: #28a745; color: white; margin-right: 20px; z-index: 10; }
        #noBtn { background-color: #dc3545; color: white; position: absolute; z-index: 999; }
        .heart { position: absolute; font-size: 30px; animation: floatUp 2s ease-in-out infinite; opacity: 0; }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1 id="text">Mani sevasanmi? 🥺👉👈</h1>
    
    <div class="btn-container">
        <button id="yesBtn" onclick="sevgilim()">Ha! 🥰</button>
        <button id="noBtn" onmouseover="qoch()" onclick="qoch()">Yo'q 😜</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const text = document.getElementById('text');
        
        function qoch() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth - 40) + 20;
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight - 150) + 100;
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        function sevgilim() {
            text.innerHTML = "💖 Men ham seni juda ham yaxshi ko'raman! 💖";
            noBtn.style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            
            for(let i=0; i<50; i++) {
                setTimeout(() => {
                    const heart = document.createElement('div');
                    heart.classList.add('heart');
                    heart.innerHTML = '❤️';
                    heart.style.left = Math.random() * 100 + 'vw';
                    heart.style.animationDuration = (Math.random() * 1 + 1) + 's';
                    document.body.appendChild(heart);
                }, i * 50);
            }
        }
    </script>
</body>
</html>
