<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Muhabbatim</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe6e6, #ffb3b3);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }
        .container {
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 85%;
            width: 320px;
            z-index: 10;
        }
        h1 {
            color: #ff4d6d;
            font-size: 24px;
            margin-bottom: 40px;
        }
        .buttons-wrapper {
            display: flex;
            justify-content: center;
            gap: 30px; /* Tugmalarni majburiy yonma-yon qilish uchun masofa */
            align-items: center;
            width: 100%;
            height: 60px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            transition: all 0.1s ease;
        }
        /* Tabrik sahifasi */
        .celebration {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff0f5;
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .celebration h2 {
            color: #ff1493;
            font-size: 26px;
            line-height: 1.5;
            animation: pulse 1s infinite alternate;
        }
        .heart-rain {
            position: absolute;
            font-size: 24px;
            animation: fall 3s linear infinite;
            opacity: 0.8;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container" id="mainBox">
        <h1>Mani sevasanmi? 🥺👉👈</h1>
        <div class="buttons-wrapper">
            <button id="yesBtn" onclick="showTabrik()">Ha 🥰</button>
            <button id="noBtn" onmouseover="qoch()" ontouchstart="qoch(event)">Yo'q 😜</button>
        </div>
    </div>

    <!-- Yashirin Tabrik Sahifasi -->
    <div class="celebration" id="tabrikBox">
        <h2>Uraaa! 🎉<br>Sani judayam yaxshi ko'raman! ❤️😘</h2>
        <p style="font-size: 50px; margin: 20px 0;">💑✨</p>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const mainBox = document.getElementById('mainBox');
        const tabrikBox = document.getElementById('tabrikBox');

        function qoch(event) {
            if(event) event.preventDefault(); // Telefon ekranda bosganda sahifa qimirlamasligi uchun

            const padding = 50;
            // Ekran bo'yicha erkin qochish joyi
            const maxX = window.innerWidth - noBtn.offsetWidth - padding;
            const maxY = window.innerHeight - noBtn.offsetHeight - padding;

            const randomX = Math.max(padding, Math.floor(Math.random() * maxX));
            const randomY = Math.max(padding, Math.floor(Math.random() * maxY));

            // Qochganda element blokdan chiqib ketishi uchun fixed qilamiz
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        }

        function showTabrik() {
            mainBox.style.display = 'none';
            tabrikBox.style.display = 'flex';
            setInterval(createHeart, 150);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-rain');
            heart.innerHTML = ['❤️', '💖', '💝', '💕', '🌸'][Math.floor(Math.random() * 5)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 2 + 's';
            heart.style.fontSize = Math.random() * 20 + 20 + 'px';
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 3000);
        }
    </script>
</body>
</html>
